name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check, and build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Lint
        run: npm run lint
        shell: bash

      - name: Type check
        run: npx tsc --noEmit
        shell: bash

      - name: Build
        run: npm run build
        shell: bash
